name: Docs Doctrine

on:
  push:
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctrine:
    uses: alawein/alawein/.github/workflows/doctrine-reusable.yml@71b307f56d8d1f3b2f423d31159f2c0f0242ad5c
    with:
      strict: "true"
