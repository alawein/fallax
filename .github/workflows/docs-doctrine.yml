name: Docs Doctrine

on:
  push:
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctrine:
    uses: alawein/alawein/.github/workflows/doctrine-reusable.yml@40ba4599aacde6f98744bc1c15652aaee03edbc2
    with:
      strict: "true"
