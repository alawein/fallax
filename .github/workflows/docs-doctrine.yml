name: Docs Doctrine

on:
  push:
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctrine:
    uses: alawein/alawein/.github/workflows/doctrine-reusable.yml@a054d4c611aa44ec9a91dd3044742a9c82fc5fd7
    with:
      strict: "true"
